name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ruff (lint)
        run: ruff check .

      - name: Run black (format check)
        run: black --check --line-length 100 .

      - name: Run mypy (type check)
        run: mypy config/ utils/ --ignore-missing-imports

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install sqlalchemy pydantic pydantic-settings structlog tenacity

      - name: Create .env for tests
        run: cp .env.example .env

      - name: Run unit tests
        run: pytest tests/unit/ -v --timeout=30 -m "not live"
